hardware_interface:
  - name: DiffDriveHardware
    plugin: robot_hardware/DiffDriveHardware
    parameters:
      left_wheel_name: "left_wheel"
      right_wheel_name: "right_wheel"
      wheel_separation: 0.24  # meters between wheels
      wheel_radius: 0.05      # wheel radius in meters
      encoder_resolution: 1024 # pulses per revolution
      motor_max_rpm: 200
      gpio_config:
        # L298N Motor Driver
        left_motor_pwm: 12    # GPIO pins
        left_motor_in1: 22
        left_motor_in2: 27
        right_motor_pwm: 13
        right_motor_in3: 17
        right_motor_in4: 18
        # Encoders
        left_encoder_a: 21
        left_encoder_b: 20
        right_encoder_a: 16
        right_encoder_b: 1

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    
    # Controllers to load on startup
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController
      
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# Differential drive controller configuration
diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["left_wheel"]
    right_wheel_names: ["right_wheel"]
    
    wheel_separation: 0.24
    wheel_radius: 0.05
    
    # Twist message timeout
    cmd_vel_timeout: 0.5
    
    # Publishing
    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    
    # Limits
    linear:
      x:
        has_velocity_limits: true
        max_velocity: 1.0
        has_acceleration_limits: true
        max_acceleration: 1.0
    angular:
      z:
        has_velocity_limits: true
        max_velocity: 1.0
        has_acceleration_limits: true
        max_acceleration: 1.0

joint_state_broadcaster:
  ros__parameters:
    joints:
      - left_wheel
      - right_wheel
