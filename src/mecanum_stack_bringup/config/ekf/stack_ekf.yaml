# Wheel odometry + IMU fusion for mecanum stack.
# Subscribes to /odom (mecanum_hardware_interface) and /imu/mpu6050.
# Publishes /odometry/filtered and odom -> base_link TF when publish_tf is true.

ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    imu0: /imu/mpu6050
    imu0_config: [false, false, false,
                  false,  false,  true,
                  false, false, false,
                  false,  false,  true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
