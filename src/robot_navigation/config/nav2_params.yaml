amcl:
  ros__parameters:
    use_map_topic: true
    scan_topic: scan
    min_particles: 100
    max_particles: 500
    odom_frame_id: odom
    base_frame_id: base_link
    global_frame_id: map
    use_sim_time: false

map_server:
  ros__parameters:
    yaml_filename: /home/pi4/my_map.yaml
    use_sim_time: false

controller_server:
  ros__parameters:
    odom_topic: /odometry/filtered

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0

bt_navigator:
  ros__parameters:
    use_sim_time: false

behavior_server:
  ros__parameters:
    use_sim_time: false
