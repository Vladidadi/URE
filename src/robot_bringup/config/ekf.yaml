# Requires /odom (wheel driver) for TF. With mecanum publish_tf false, ONLY this node may
# publish odom->base_link (publish_tf below). If IMU is unplugged, use ekf_odom_only.yaml instead.
ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.5
    two_d_mode: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /odom
    odom0_config: [true,  true,  false,   # x, y, z
                   false, false, true,   # roll, pitch, yaw
                   true,  true,  false,   # x_vel, y_vel, z_vel
                   false, false, true,    # roll_vel, pitch_vel, yaw_vel
                   false, false, false]   # x_acc, y_acc, z_acc
    odom0_differential: false
    odom0_relative: false

    imu0: /imu/mpu6050
    imu0_config: [false, false, false,   # x, y, z (position)
                  false,  false,  true,    # roll, pitch, yaw (orientation)
                  false, false, false,   # x_vel, y_vel, z_vel
                  false,  false,  true,    # roll_vel, pitch_vel, yaw_vel
                  false, false, false]   # x_acc, y_acc, z_acc
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
