/**:
  ros__parameters:
    # Serial Configuration
    serial_port: "/dev/ttyACM1"  # or /dev/ttyACM0 depending on your Arduino
    baud_rate: 115200
    
    # Robot Physical Parameters (adjust these to match your robot)
    wheel_radius: 0.05  # meters (50mm)
    wheel_base_width: 0.20  # meters (distance between left and right wheels)
    wheel_base_length: 0.20  # meters (distance between front and rear wheels)
    
    # Motor Configuration
    encoder_cpr: 5764  # 44 pulses * 131 gear ratio for JGB motors
    # Reduce stationary jitter (counts/tick); increase if wheels still creep in RViz when stopped.
    encoder_deadband: 8
    cmd_vel_linear_deadband: 0.02
    cmd_vel_angular_deadband: 0.05
    # Drop a tick if any wheel raw delta exceeds this (serial glitch / misaligned frame).
    max_encoder_delta_per_tick: 4000
    # Per-wheel command to Arduino (was hardcoded 30). Lower = slower top speed / less current.
    max_motor_command: 22
    
    # Frame IDs (must match ekf.yaml map_frame/odom_frame/base_link_frame)
    odom_frame: "odom"
    base_frame: "base_link"
    # Overridden by mecanum_hardware_launch.py publish_tf arg (mecanum_full_stack sets false when EKF on).
    # If you ros2 run the node with only this yaml: set true when EKF is not running.
    publish_tf: false
