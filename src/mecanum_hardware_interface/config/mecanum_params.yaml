/**:
  ros__parameters:
    # Serial Configuration
    serial_port: "/dev/ttyACM1"  # or /dev/ttyACM0 depending on your Arduino
    baud_rate: 115200
    
    # Robot Physical Parameters (adjust these to match your robot)
    wheel_radius: 0.05  # meters (50mm)
    wheel_base_width: 0.20  # meters (distance between left and right wheels)
    wheel_base_length: 0.20  # meters (distance between front and rear wheels)
    
    # Motor Configuration
    encoder_cpr: 5764  # 44 pulses * 131 gear ratio for JGB motors
    # Reduce stationary jitter (counts/tick); increase if odom feels sluggish when creeping.
    encoder_deadband: 2
    # Drop a tick if any wheel raw delta exceeds this (serial glitch / misaligned frame).
    max_encoder_delta_per_tick: 4000
    
    # Frame IDs (must match ekf.yaml map_frame/odom_frame/base_link_frame)
    odom_frame: "odom"
    base_frame: "base_link"
    # false when ekf_node publishes odom->base_link (robot_bringup/config/ekf.yaml publish_tf: true).
    # If IMU is off, run EKF with robot_bringup/config/ekf_odom_only.yaml so the filter still runs.
    publish_tf: false
